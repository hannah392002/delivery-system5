<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Library Delivery System</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0d6efd">

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="print.css" media="print">

</head>

<body>

<header>

<h1>📚 Library Delivery System</h1>

<p>نظام دليفري المكتبة</p>

</header>

<div class="container">

<div class="card">

<h2>بيانات العميل</h2>

<div class="grid">

<div>

<label>اسم العميل</label>

<input id="customerName" type="text">

</div>

<div>

<label>رقم الموبايل الأول</label>

<input id="phone1" type="tel">

</div>

<div>

<label>رقم الموبايل الثاني</label>

<input id="phone2" type="tel">

</div>

<div>

<label>العنوان</label>

<textarea id="address"></textarea>

</div>

</div>

</div>

<div class="card">

<div class="titleRow">

<h2>الكتب</h2>

<button id="addBookBtn">➕ إضافة كتاب</button>

</div>

<table id="booksTable">

<thead>

<tr>

<th>اسم الكتاب</th>

<th>عدد النسخ</th>

<th>رقم الحجز</th>

<th></th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

<div class="buttons">

<button id="saveBtn">

💾 حفظ الطلب

</button>

<button id="clearBtn">

🗑️ جديد

</button>

</div>

<div class="card">

<div class="titleRow">

<h2>البحث</h2>

<input id="searchInput"

placeholder="ابحث بالاسم أو الهاتف أو رقم الطلب">

</div>

</div>

<div class="card">

<h2>جميع الطلبات</h2>

<div id="ordersContainer"></div>

</div>

</div>

<template id="bookRowTemplate">

<tr>

<td>

<input class="bookName">

</td>

<td>

<input class="bookQty"

type="number"

value="1"

min="1">

</td>

<td>

<input class="bookReserve">

</td>

<td>

<button class="removeBook">

❌

</button>

</td>

</tr>

</template>

<script src="script.js"></script>

<script>

if('serviceWorker' in navigator){

navigator.serviceWorker.register('sw.js');

}

</script>

</body>

</html>
